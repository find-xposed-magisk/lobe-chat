name: Claude Issue Dedupe
# Automatically dedupe GitHub issues using Claude Code
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process for duplicate detection'
        required: true
        type: string

jobs:
  claude-dedupe-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check whether issue should be deduped
        id: dedupe-preflight
        run: bun run .github/scripts/should-run-dedupe.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}

      - name: Copy security prompt
        if: steps.dedupe-preflight.outputs.should_dedupe == 'true'
        run: |
          mkdir -p /tmp/claude-prompts
          cp .claude/prompts/security-rules.md /tmp/claude-prompts/

      - name: Run Claude Code slash command
        if: steps.dedupe-preflight.outputs.should_dedupe == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: '*'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Security: Using slash command which has built-in restrictions
          # The /dedupe command only performs read operations and label additions
          claude_args: |
            --append-system-prompt "$(cat /tmp/claude-prompts/security-rules.md)"
          prompt: '/dedupe ${{ github.repository }}/issues/${{ github.event.issue.number || inputs.issue_number }}'
